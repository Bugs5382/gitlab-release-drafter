# 05 — Shared template: define the jobs once, include them everywhere.
#
# Put this file in a central repo (e.g. group/ci-templates). Each consuming
# project then needs only a few lines in its own .gitlab-ci.yml:
#
#   include:
#     - project: "group/ci-templates"
#       file: "/gitlab-release-drafter.yml"
#       ref: main
#
#   stages: [label, preview, release]
#
# Set GLRD_CONFIG and GLRD_TOKEN as GROUP-level CI/CD variables so every project
# inherits them — that's how one config can drive many repos.

variables:
  GLRD_IMAGE: ghcr.io/bugs5382/gitlab-release-drafter:latest

# Hidden base job (the leading dot) holding common settings.
.glrd:
  image: $GLRD_IMAGE
  interruptible: true

autolabel:
  extends: .glrd
  stage: label
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - gitlab-release-drafter label

preview:
  extends: .glrd
  stage: preview
  script:
    - gitlab-release-drafter preview
  artifacts:
    reports:
      dotenv: release.env
    paths:
      - release-notes.md

release:
  extends: .glrd
  stage: release
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  script:
    - gitlab-release-drafter release
  artifacts:
    paths:
      - CHANGELOG.md
      - release-notes.md
