name: Docker Build
# Validates that the image builds on every PR and push to main.
# Does not push — see job-publish.yaml for the release publish.
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          tags: gitlab-release-drafter:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
