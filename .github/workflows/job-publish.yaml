name: Publish Image
# Builds and pushes the image to GHCR when a GitHub Release is published (the
# maintainer publishes releases by hand). Manual dispatch is available for
# re-publishing a given tag.
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. v0.2.0)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image and tags
        id: meta
        run: |
          repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi
          short="${GITHUB_SHA::7}"
          img="ghcr.io/${repo}"
          {
            echo "version=${tag}"
            echo "tags<<EOF"
            echo "${img}:${tag}"
            echo "${img}:latest"
            echo "${img}:${tag}-${short}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
