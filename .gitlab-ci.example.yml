# Example consumer pipeline for gitlab-release-drafter.
# Set GLRD_CONFIG (YAML or base64 YAML) and GLRD_TOKEN (api scope) as
# CI/CD variables — group-level works for many repos. No config file is
# committed to the target repository.

stages: [label, preview, release]

variables:
  GLRD_IMAGE: ghcr.io/bugs5382/gitlab-release-drafter:latest

autolabel:
  stage: label
  image: $GLRD_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - gitlab-release-drafter label

preview:
  stage: preview
  image: $GLRD_IMAGE
  script:
    - gitlab-release-drafter preview
  artifacts:
    reports:
      dotenv: release.env
    paths:
      - release-notes.md

release:
  stage: release
  image: $GLRD_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"          # scan closed milestones
    - if: $CI_COMMIT_TAG                              # react to a pushed tag
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH     # manual button
      when: manual
  script:
    - gitlab-release-drafter release
  artifacts:
    paths:
      - CHANGELOG.md
      - release-notes.md
